<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Orders</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Orders</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-left:auto">
        <div class="filter-chips" id="statusChips"></div>
      </div>
    </div>
    <div class="page-content">
      <div class="card">
        <table class="data-table">
          <thead><tr><th>#</th><th>Customer</th><th>City</th><th>Date</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="ordersTbody"><tr><td colspan="7"><div class="spinner"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/admin-config.js"></script>
<script>
  const staff = requireStaff(); if (!staff) throw '';
  document.getElementById('sidebar').innerHTML = buildSidebar(staff, 'orders.html');

  const STATUSES = ['','pending','confirmed','processing','shipped','delivered','cancelled'];
  let currentStatus = '';

  // Build filter chips
  document.getElementById('statusChips').innerHTML = STATUSES.map(s =>
    `<div class="fchip ${s===''?'active':''}" data-s="${s}" onclick="setStatus('${s}',this)">${s===''?'All':statusLabel(s)}</div>`
  ).join('');

  function setStatus(s, el) {
    currentStatus = s;
    document.querySelectorAll('.fchip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    load();
  }

  async function load() {
    const tbody = document.getElementById('ordersTbody');
    tbody.innerHTML = '<tr><td colspan="7"><div class="spinner"></div></td></tr>';
    let q = db.from('orders').select('*,users(full_name,email),addresses(city)').order('created_at',{ascending:false});
    if (currentStatus) q = q.eq('status', currentStatus);
    const { data } = await q;
    const orders = data || [];
    if (!orders.length) { tbody.innerHTML='<tr class="empty-row"><td colspan="7">No orders found</td></tr>'; return; }
    tbody.innerHTML = orders.map(o => `
      <tr>
        <td><b>#${o.id}</b></td>
        <td>${o.users?.full_name||'—'}<br><span style="font-size:11px;color:var(--grey-400)">${o.users?.email||''}</span></td>
        <td style="color:var(--grey-600)">${o.addresses?.city||'—'}</td>
        <td style="font-size:12px;color:var(--grey-400)">${formatDate(o.created_at)}</td>
        <td><b>${formatPrice(o.total_amount)}</b></td>
        <td>${badge(o.status)}</td>
        <td><a href="order-detail.html?id=${o.id}" class="btn btn-outline btn-sm">View →</a></td>
      </tr>`).join('');
  }

  load();
</script>
</body>
</html>
