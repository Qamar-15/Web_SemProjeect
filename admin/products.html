<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Products</div>
      <div style="display:flex;gap:10px;align-items:center;margin-left:auto">
        <div class="search-box"><span class="si">🔍</span><input id="searchInput" placeholder="Search products..." oninput="filterProducts()"></div>
        <button id="addBtn" class="btn btn-black" onclick="openModal()">➕ Add Product</button>
      </div>
    </div>
    <div class="page-content">
      <div class="card">
        <table class="data-table">
          <thead><tr><th>Image</th><th>Name</th><th>Brand</th><th>Price</th><th>Stock</th><th id="actHead">Actions</th></tr></thead>
          <tbody id="prodTbody"><tr><td colspan="6"><div class="spinner"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div id="modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modalTitle">Add Product</h3>
      <button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer">✕</button>
    </div>
    <div class="modal-body">
      <div id="imgZone" class="img-zone" onclick="triggerUpload()">
        <div class="placeholder"><div class="upload-icon">📸</div><div style="font-weight:600;margin-bottom:4px">Click to upload image</div><div style="font-size:12px">Uploads to Supabase products bucket</div></div>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="uploadImage(this)">
      <div id="uploadMsg" style="font-size:12px;margin:6px 0 12px;color:var(--grey-400)"></div>
      <input type="hidden" id="imgUrl">
      <input type="hidden" id="editId">
      <div class="field"><label>Brand</label><select id="brandSel"></select></div>
      <div class="field"><label>Product Name</label><input id="pName" placeholder="e.g. Submariner Date"></div>
      <div class="field"><label>Description</label><textarea id="pDesc" rows="3" style="resize:vertical"></textarea></div>
      <div class="field-row">
        <div class="field"><label>Price (PKR)</label><input id="pPrice" type="number" placeholder="0"></div>
        <div class="field"><label>Stock</label><input id="pStock" type="number" placeholder="0"></div>
      </div>
      <div id="formErr" style="color:#ef4444;font-size:13px;display:none"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-black" id="saveBtn" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/admin-config.js"></script>
<script>
  const staff = requireStaff(); if (!staff) throw '';
  const isAdmin = staff.role === 'admin';
  document.getElementById('sidebar').innerHTML = buildSidebar(staff, 'products.html');
  if (!isAdmin) { document.getElementById('addBtn').style.display='none'; document.getElementById('actHead').textContent=''; }

  let allProducts = [], brands = [];

  async function load() {
    const [pRes, bRes] = await Promise.all([
      db.from('products').select('*,brands(name)').order('name'),
      db.from('brands').select().order('name'),
    ]);
    allProducts = (pRes.data||[]).map(p => ({...p, brandName: p.brands?.name||''}));
    brands = bRes.data || [];
    // Fill brand dropdown
    document.getElementById('brandSel').innerHTML =
      brands.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
    renderTable(allProducts);
  }

  function filterProducts() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderTable(q ? allProducts.filter(p => p.name.toLowerCase().includes(q) || p.brandName.toLowerCase().includes(q)) : allProducts);
  }

  function renderTable(list) {
    const tbody = document.getElementById('prodTbody');
    if (!list.length) { tbody.innerHTML='<tr class="empty-row"><td colspan="6">No products found</td></tr>'; return; }
    tbody.innerHTML = list.map(p => `
      <tr>
        <td><img class="product-thumb" src="${p.image_url||''}" onerror="this.src='https://via.placeholder.com/48'"></td>
        <td><b>${p.name}</b></td>
        <td style="color:var(--grey-600)">${p.brandName}</td>
        <td><b>${formatPrice(p.price)}</b></td>
        <td><span class="badge" style="background:${p.stock>0?'rgba(34,197,94,.1)':'rgba(239,68,68,.1)'};color:${p.stock>0?'#16a34a':'#ef4444'}">${p.stock}</span></td>
        <td>${isAdmin ? `<div style="display:flex;gap:6px"><button class="btn btn-outline btn-sm btn-icon" onclick="openModal(${p.id})" title="Edit">✏️</button><button class="btn btn-danger btn-sm btn-icon" onclick="deleteProduct(${p.id},'${p.name.replace(/'/g,"\\'")}')">🗑️</button></div>` : ''}</td>
      </tr>`).join('');
  }

  function openModal(id = null) {
    const p = id ? allProducts.find(x => x.id === id) : null;
    document.getElementById('modalTitle').textContent = p ? 'Edit Product' : 'Add Product';
    document.getElementById('editId').value = p?.id || '';
    document.getElementById('imgUrl').value = p?.image_url || '';
    document.getElementById('pName').value  = p?.name || '';
    document.getElementById('pDesc').value  = p?.description || '';
    document.getElementById('pPrice').value = p?.price || '';
    document.getElementById('pStock').value = p?.stock || '';
    document.getElementById('brandSel').value = p?.brand_id || brands[0]?.id || '';
    document.getElementById('formErr').style.display = 'none';
    document.getElementById('uploadMsg').textContent = '';
    // Image preview
    const zone = document.getElementById('imgZone');
    if (p?.image_url) {
      zone.innerHTML = `<img src="${p.image_url}" style="width:100%;height:200px;object-fit:cover;border-radius:8px"><div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);color:#fff;font-size:12px;text-align:center;padding:8px;cursor:pointer">Click to change</div>`;
    } else {
      zone.innerHTML = '<div class="placeholder"><div class="upload-icon">📸</div><div style="font-weight:600;margin-bottom:4px">Click to upload image</div><div style="font-size:12px">Uploads to Supabase products bucket</div></div>';
    }
    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }
  function triggerUpload() { document.getElementById('fileInput').click(); }

  async function uploadImage(input) {
    const file = input.files[0]; if (!file) return;
    const msg = document.getElementById('uploadMsg');
    msg.textContent = 'Uploading...'; msg.style.color = 'var(--grey-400)';
    const ext = file.name.split('.').pop();
    const fileName = `product_${Date.now()}.${ext}`;
    const { error } = await db.storage.from('products').upload(fileName, file, { upsert: true, contentType: file.type });
    if (error) { msg.textContent = 'Upload failed: ' + error.message; msg.style.color = '#ef4444'; return; }
    const url = db.storage.from('products').getPublicUrl(fileName).data.publicUrl;
    document.getElementById('imgUrl').value = url;
    document.getElementById('imgZone').innerHTML = `<img src="${url}" style="width:100%;height:200px;object-fit:cover;border-radius:8px">`;
    msg.textContent = '✓ Image uploaded'; msg.style.color = '#16a34a';
  }

  async function saveProduct() {
    const id    = document.getElementById('editId').value;
    const name  = document.getElementById('pName').value.trim();
    const price = parseFloat(document.getElementById('pPrice').value);
    const stock = parseInt(document.getElementById('pStock').value);
    const brandId = document.getElementById('brandSel').value;
    const imageUrl = document.getElementById('imgUrl').value;
    const desc  = document.getElementById('pDesc').value.trim();
    const err   = document.getElementById('formErr');
    if (!name || !brandId || isNaN(price) || isNaN(stock)) { err.textContent='Please fill all required fields.'; err.style.display='block'; return; }
    if (!imageUrl) { err.textContent='Please upload a product image.'; err.style.display='block'; return; }
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving...';
    const payload = { brand_id: brandId, name, description: desc, price, stock, image_url: imageUrl };
    const { error } = id
      ? await db.from('products').update(payload).eq('id', id)
      : await db.from('products').insert(payload);
    btn.disabled = false; btn.textContent = 'Save Product';
    if (error) { err.textContent = error.message; err.style.display='block'; return; }
    toast(id ? 'Product updated ✓' : 'Product added ✓');
    closeModal(); load();
  }

  async function deleteProduct(id, name) {
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    const { error } = await db.from('products').delete().eq('id', id);
    if (error) { toast('Cannot delete: ' + error.message, 'error'); return; }
    toast('Product deleted'); load();
  }

  load();
</script>
</body>
</html>
