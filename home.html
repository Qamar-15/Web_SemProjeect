<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Time Keepers — Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- HEADER -->
<header class="site-header">
  <a class="logo" href="home.html">TIME <span>KEEPERS</span></a>
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input id="searchInput" type="text" placeholder="Search watches, brands..." oninput="filterProducts()">
  </div>
  <nav class="nav-links">
    <a class="nav-link active" href="home.html">🏠 Shop</a>
    <a class="nav-link" href="cart.html" id="cartLink">🛒 Cart <span class="cart-badge" id="cartCount">0</span></a>
    <a class="nav-link" href="profile.html">👤 Profile</a>
    <a class="nav-link" href="#" onclick="logout()" style="color:var(--red)">↩ Logout</a>
  </nav>
</header>

<!-- BRAND FILTERS -->
<div class="brand-chips" id="brandChips">
  <div class="chip active" data-id="" onclick="selectBrand(this, '')">All</div>
</div>

<!-- PRODUCTS -->
<section class="products-section">
  <div class="products-header">
    <div>
      <h2 style="font-size:22px;font-weight:800">Our Collection</h2>
      <div class="products-count" id="countLabel">Loading...</div>
    </div>
  </div>
  <div id="productGrid" class="product-grid"><div class="spinner"></div></div>
</section>

<!-- PRODUCT MODAL -->
<div id="modal" class="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="document.getElementById('modal').style.display='none'">✕</button>
    <img id="mImg" class="modal-img" src="" alt="">
    <div class="modal-body">
      <div id="mBrand" style="font-size:12px;font-weight:700;letter-spacing:2px;color:var(--grey-400)"></div>
      <div id="mName" style="font-size:26px;font-weight:900;line-height:1.2"></div>
      <div id="mRating"></div>
      <div id="mPrice" style="font-size:24px;font-weight:800"></div>
      <div id="mStock"></div>
      <div id="mDesc" style="font-size:14px;color:var(--grey-600);line-height:1.7"></div>
      <div style="display:flex;gap:10px;align-items:center;margin-top:auto">
        <button class="btn btn-outline btn-sm" onclick="changeQty(-1)">−</button>
        <span id="mQty" style="font-weight:700;font-size:16px;min-width:24px;text-align:center">1</span>
        <button class="btn btn-outline btn-sm" onclick="changeQty(1)">+</button>
      </div>
      <button id="mAddBtn" class="btn btn-black" style="width:100%;justify-content:center" onclick="addToCartModal()">Add to Cart</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/user-config.js"></script>
<script>
  let user = requireUser();
  let allProducts = [], filteredProducts = [], selectedBrandId = '', modalProduct = null, modalQty = 1;

  // Cart badge
  function updateCartBadge() { document.getElementById('cartCount').textContent = Cart.count(); }
  updateCartBadge();

  // Logout
  function logout() { Session.clearUser(); Cart.clear(); location.href = 'index.html'; }

  // Load brands
  async function loadBrands() {
    const { data } = await db.from('brands').select().order('name');
    const wrap = document.getElementById('brandChips');
    (data || []).forEach(b => {
      const chip = document.createElement('div');
      chip.className = 'chip'; chip.dataset.id = b.id; chip.textContent = b.name;
      chip.onclick = () => selectBrand(chip, b.id);
      wrap.appendChild(chip);
    });
  }

  function selectBrand(el, id) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    selectedBrandId = id;
    filterProducts();
  }

  function filterProducts() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    filteredProducts = allProducts.filter(p => {
      const matchBrand = !selectedBrandId || String(p.brand_id) === String(selectedBrandId);
      const matchSearch = !q || p.name.toLowerCase().includes(q) || (p.brandName||'').toLowerCase().includes(q);
      return matchBrand && matchSearch;
    });
    renderProducts(filteredProducts);
  }

  // Load products
  async function loadProducts() {
    const { data } = await db.from('products').select('*, brands(name)').order('name');
    allProducts = (data || []).map(p => ({ ...p, brandName: p.brands?.name || '' }));
    filteredProducts = allProducts;
    renderProducts(allProducts);
  }

  function renderProducts(list) {
    const grid = document.getElementById('productGrid');
    document.getElementById('countLabel').textContent = `${list.length} watch${list.length !== 1 ? 'es' : ''}`;
    if (!list.length) { grid.innerHTML = '<div class="empty-state"><div class="icon">⌚</div><h3>No products found</h3></div>'; return; }
    grid.innerHTML = list.map(p => `
      <div class="product-card" onclick="openModal(${p.id})">
        <img class="product-img" src="${p.image_url || ''}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/400x300?text=Watch'">
        <div class="product-info">
          <div class="product-brand">${p.brandName}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-meta">
            <div class="rating">⭐ ${Number(p.rating||0).toFixed(1)} <span style="color:var(--grey-400)">(${p.review_count||0})</span></div>
            <span class="stock-badge ${p.stock > 0 ? 'in-stock' : 'out-stock'}">${p.stock > 0 ? `${p.stock} left` : 'Out of stock'}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="product-price">${formatPrice(p.price)}</div>
            <button class="btn btn-black btn-sm" onclick="event.stopPropagation();quickAdd(${p.id})" ${p.stock===0?'disabled':''}>+ Cart</button>
          </div>
        </div>
      </div>`).join('');
  }

  function quickAdd(id) {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    Cart.add(p); updateCartBadge(); toast(`${p.name} added to cart 🛒`);
  }

  function openModal(id) {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    modalProduct = p; modalQty = 1;
    document.getElementById('mImg').src = p.image_url || '';
    document.getElementById('mBrand').textContent = p.brandName;
    document.getElementById('mName').textContent = p.name;
    document.getElementById('mPrice').textContent = formatPrice(p.price);
    document.getElementById('mRating').innerHTML = `<span style="color:var(--grey-600);font-size:13px">⭐ ${Number(p.rating||0).toFixed(1)} · ${p.review_count||0} reviews</span>`;
    document.getElementById('mStock').innerHTML = `<span class="stock-badge ${p.stock>0?'in-stock':'out-stock'}">${p.stock>0?`${p.stock} in stock`:'Out of stock'}</span>`;
    document.getElementById('mDesc').textContent = p.description || 'No description available.';
    document.getElementById('mQty').textContent = 1;
    document.getElementById('mAddBtn').disabled = p.stock === 0;
    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal(e) { if (e.target.id === 'modal') document.getElementById('modal').style.display = 'none'; }
  function changeQty(d) { modalQty = Math.max(1, Math.min(modalProduct?.stock || 1, modalQty + d)); document.getElementById('mQty').textContent = modalQty; }
  function addToCartModal() {
    if (!modalProduct) return;
    Cart.add(modalProduct, modalQty); updateCartBadge();
    document.getElementById('modal').style.display = 'none';
    toast(`${modalProduct.name} × ${modalQty} added to cart 🛒`);
  }

  loadBrands(); loadProducts();
</script>
</body>
</html>
